name: globo_logistics
description: Plataforma integral de gestión, auditoría y seguridad en transporte logístico.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2

  # State Management
  flutter_riverpod: ^2.5.1

  # Dependency Injection
  get_it: ^8.0.2

  # Navigation
  go_router: ^14.2.7

  # Maps & Geo
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1

  # OCR
  google_mlkit_text_recognition: ^0.13.1
  image_picker: ^1.1.2

  # Offline / Local Storage
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.5

  # UI
  fl_chart: ^0.69.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  dartz: ^0.10.1
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.5.0
  logger: ^2.4.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  # Inter font loaded at runtime via google_fonts package (no binary assets needed)
