  <script src="flutter_bootstrap.js" async></script>

  <!-- Globo Logistics — Alarma SOS (Web Audio API, sin archivos de audio) -->
  <script>
    function globoPlaySosAlarm() {
      if (window._sosAlarmInterval) return;
      var AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      window._sosAlarmCtx = new AudioCtx();

      function playPulse() {
        var ctx = window._sosAlarmCtx;
        if (!ctx || ctx.state === 'closed') return;
        if (ctx.state === 'suspended') ctx.resume();
        var t    = ctx.currentTime;
        var osc  = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(600, t);
        osc.frequency.exponentialRampToValueAtTime(1050, t + 0.38);
        osc.frequency.exponentialRampToValueAtTime(600,  t + 0.76);
        gain.gain.setValueAtTime(0,    t);
        gain.gain.linearRampToValueAtTime(0.28, t + 0.05);
        gain.gain.setValueAtTime(0.28, t + 0.70);
        gain.gain.linearRampToValueAtTime(0,    t + 0.76);
        osc.start(t);
        osc.stop(t + 0.77);
      }

      playPulse();
      window._sosAlarmInterval = setInterval(playPulse, 860);
    }

    function globoStopSosAlarm() {
      if (window._sosAlarmInterval) {
        clearInterval(window._sosAlarmInterval);
        window._sosAlarmInterval = null;
      }
      if (window._sosAlarmCtx) {
        try { window._sosAlarmCtx.close(); } catch (e) {}
        window._sosAlarmCtx = null;
      }
    }
  </script>
</body>
